<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --p1:#f9c6d0;--p2:#d9bff8;--p3:#b8e0d2;--p4:#fde8b4;--p5:#f5c6e8;
  --bg:#fdf6f9;--surface:#ffffff;--border:#f0e0eb;
  --text:#4a3f4a;--text-sub:#8a7a8a;--text-muted:#b8a8b8;
  --accent:#c97eb8;--font:'Pretendard','Apple SD Gothic Neo',sans-serif;--radius:16px;

  /* OSIPECH 스타일 pair page 전용 변수 */
  --pp-bg:#1a2a1e;
  --pp-sidebar:#f5f2ee;
  --pp-sidebar-border:#e8e2da;
  --pp-surface:#ffffff;
  --pp-green:#24553d;
  --pp-green-light:#3d7a5a;
  --pp-pink:#e8a0a8;
  --pp-pink-light:#f2c4c8;
  --pp-text:#2a1f1f;
  --pp-text-sub:#6b5a5a;
  --pp-text-muted:#a89898;
  --pp-accent:#c75f6b;
  --pp-card:#ffffff;
  --pp-card-border:#ede8e2;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* ── 창 모드: body = 바깥 배경, .app-window = 실제 앱 창 ── */
body{
  font-family:var(--font);color:var(--text);
  min-height:100vh;overflow:hidden;
  /* 바깥 배경 — CSS 변수로 바꿀 수 있어요 */
  background: var(--outer-bg, #e8e0f0);
  display:flex;align-items:center;justify-content:center;
  padding:0;
}

/* 앱 전체를 감싸는 창 */
.app-window{
  width:var(--win-w, 1100px);
  height:var(--win-h, 700px);
  background:var(--bg);
  border-radius:18px;
  box-shadow:0 8px 48px rgba(80,40,80,0.18), 0 2px 8px rgba(80,40,80,0.1);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  position:relative;
  min-width:420px;min-height:400px;
  max-width:calc(100vw - 2rem);max-height:calc(100vh - 2rem);
}

.page{display:none;flex:1;overflow:auto;min-height:0;}
.page.active{display:flex;flex-direction:column;}

/* 창 리사이즈 핸들 (우하단) */
.win-resize-handle{
  position:absolute;bottom:0;right:0;
  width:22px;height:22px;
  cursor:se-resize;z-index:9999;
  display:flex;align-items:flex-end;justify-content:flex-end;
  padding:4px;
  color:rgba(150,100,150,0.45);
  font-size:0.75rem;
  line-height:1;
  user-select:none;
  pointer-events:auto;
}
.win-resize-handle::before{
  content:'◢';
  font-size:14px;
}

/* 맥OS 타이틀바 */
.app-titlebar{
  height:36px;
  background:rgba(0,0,0,0.04);
  border-bottom:1px solid rgba(0,0,0,0.07);
  display:flex;align-items:center;padding:0 14px;
  gap:7px;flex-shrink:0;
  position:relative;
}
.app-titlebar-dot{
  width:12px;height:12px;border-radius:50%;
  flex-shrink:0;
}
.app-titlebar-dot.red{background:#ff5f57;}
.app-titlebar-dot.yellow{background:#febc2e;}
.app-titlebar-dot.green{background:#28c840;}
.app-titlebar-label{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:0.72rem;color:rgba(0,0,0,0.35);
  font-weight:500;letter-spacing:0.04em;
  pointer-events:none;
}

/* 바깥 배경 색상 변경 버튼 (우하단 고정) */
.outer-bg-picker{
  position:fixed;bottom:1.2rem;left:1.2rem;z-index:9999;
  background:rgba(255,255,255,0.9);
  border:1.5px solid rgba(180,140,180,0.35);
  border-radius:999px;padding:0.35rem 0.8rem;
  font-family:var(--font);font-size:0.7rem;
  color:#6a556a;cursor:pointer;
  display:flex;align-items:center;gap:0.4rem;
  box-shadow:0 2px 10px rgba(130,80,130,0.12);
  backdrop-filter:blur(6px);
  transition:border-color 0.15s;
}
.outer-bg-picker:hover{border-color:var(--accent);}
.outer-bg-picker input[type=color]{
  width:22px;height:22px;border:none;background:none;
  border-radius:50%;cursor:pointer;padding:0;
}

/* ── 페이지 전환 슬라이드 애니메이션 ── */
.page{
  position:absolute;inset:36px 0 0 0; /* 타이틀바(36px) 아래 전체 */
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transform:translateX(60px);
  transition:opacity 0.28s cubic-bezier(.4,0,.2,1), transform 0.28s cubic-bezier(.4,0,.2,1);
  background:var(--bg);
  overflow:hidden;
}
.page.active{
  opacity:1;pointer-events:auto;
  transform:translateX(0);
}
.page.slide-out{
  opacity:0;
  transform:translateX(-60px);
  pointer-events:none;
}

#hub{padding:2.5rem 1.5rem 3rem;display:flex;flex-direction:column;align-items:center;overflow-y:auto;}
#hub.active{display:flex;}
#pairPage.active{display:flex;flex-direction:column;min-height:0;}
.hub-header{text-align:center;margin-bottom:2.5rem;}
.hub-title{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;background:linear-gradient(135deg,var(--p1),var(--accent),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hub-sub{font-size:0.85rem;color:var(--text-muted);margin-top:0.4rem;}
.hub-admin-bar{display:flex;justify-content:center;gap:0.6rem;margin-top:1rem;flex-wrap:wrap;}
.pairs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;max-width:900px;margin:0 auto;}
.pair-card{position:relative;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform 0.18s,border-color 0.18s;aspect-ratio:2/3;max-width:160px;display:flex;flex-direction:column;}
.pair-card:hover{transform:translateY(-4px);border-color:var(--p2);}
.pair-avatar{width:100%;flex:1;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--p1),var(--p2));display:flex;align-items:center;justify-content:center;}
.pair-avatar img{width:100%;height:100%;object-fit:cover;display:none;}
.pair-avatar img.loaded{display:block;}
.pair-avatar-placeholder{font-size:3rem;opacity:0.5;}
.pair-info{padding:0.9rem 1rem;border-top:1.5px solid var(--border);}
.pair-name{font-size:0.88rem;font-weight:700;color:var(--text);}
.pair-count{font-size:0.72rem;color:var(--text-muted);margin-top:2px;}
.pair-del{position:absolute;top:0.5rem;right:0.5rem;background:rgba(255,255,255,0.9);border:1px solid var(--border);border-radius:8px;width:26px;height:26px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:0.75rem;color:var(--text-muted);z-index:5;}
.is-admin .pair-card:hover .pair-del{display:flex;}
.add-pair-card{background:none;border:2px dashed var(--border);border-radius:16px;aspect-ratio:2/3;max-width:160px;display:none;align-items:center;justify-content:center;flex-direction:column;gap:0.5rem;cursor:pointer;font-family:var(--font);color:var(--text-muted);font-size:0.82rem;transition:border-color 0.15s;}
.add-pair-card:hover{border-color:var(--accent);color:var(--accent);}
.add-pair-card span{font-size:1.8rem;}
.is-admin .add-pair-card{display:flex;}

/* ===== PAIR PAGE: OSIPECH-inspired Layout ===== */
#pairPage{position:relative;background:var(--pp-sidebar);}

/* 전체 레이아웃: 사이드바 + 메인 */
#home{
  display:flex;background:var(--pp-sidebar);flex:1;overflow:hidden;min-height:0;
}
#archive{background:var(--pp-sidebar);flex:1;overflow:hidden;min-height:0;display:flex;}

/* ── 사이드바 ── */
.pp-sidebar{
  width:200px;flex-shrink:0;background:var(--pp-sidebar);
  border-right:1px solid var(--pp-sidebar-border);
  display:flex;flex-direction:column;align-items:center;
  padding:1.5rem 0 1.5rem;
  overflow-y:auto;
  scrollbar-width:none;
  border-radius:0;
  align-self:stretch;
}
.pp-sidebar::-webkit-scrollbar{display:none;}

.pp-sidebar-avatar{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--pp-green),var(--pp-pink));
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;border:3px solid var(--pp-card-border);
  margin-bottom:0.6rem;flex-shrink:0;
}
.pp-sidebar-avatar img{width:100%;height:100%;object-fit:cover;display:none;}
.pp-sidebar-avatar img.loaded{display:block;}

.is-admin .pp-sidebar-avatar:hover::after{
  content:'📷';
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.35);border-radius:50%;font-size:1.2rem;cursor:pointer;
}
.pp-sidebar-avatar{position:relative;cursor:default!important;}
.is-admin .pp-sidebar-avatar{cursor:pointer!important;}

.is-admin .pp-sidebar-name[contenteditable],
.is-admin .pp-sidebar-subtitle[contenteditable],
.is-admin .pp-sidebar-credit[contenteditable]{
  cursor:text;
  border-bottom:1px dashed rgba(36,85,61,0.3);
  border-radius:2px;
  padding:1px 3px;
}
.is-admin .pp-sidebar-name[contenteditable]:focus,
.is-admin .pp-sidebar-subtitle[contenteditable]:focus,
.is-admin .pp-sidebar-credit[contenteditable]:focus{
  background:rgba(36,85,61,0.06);
  outline:none;
}

.pp-sidebar-name{
  font-size:0.8rem;font-weight:700;color:var(--pp-text);
  text-align:center;letter-spacing:0.04em;margin-bottom:0.15rem;
}
.pp-sidebar-subtitle{
  font-size:0.62rem;color:var(--pp-text-muted);text-align:center;
  margin-bottom:1.2rem;letter-spacing:0.03em;
}

.pp-nav{display:flex;flex-direction:column;width:100%;padding:0 0.75rem;gap:0.1rem;}
.pp-nav-item{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.5rem 0.75rem;border-radius:10px;
  font-size:0.78rem;font-weight:500;color:var(--pp-text-sub);
  cursor:pointer;transition:background 0.15s,color 0.15s;
  border:none;background:none;font-family:var(--font);
  text-align:left;width:100%;
}
.pp-nav-item:hover{background:rgba(36,85,61,0.08);color:var(--pp-green);}
.pp-nav-item.active{background:rgba(36,85,61,0.12);color:var(--pp-green);font-weight:600;}
.pp-nav-icon{font-size:0.9rem;width:18px;text-align:center;}

.pp-sidebar-divider{
  width:calc(100% - 1.5rem);height:1px;
  background:var(--pp-sidebar-border);margin:0.75rem 0;
}

.pp-sidebar-footer{
  margin-top:auto;padding:0 0.75rem;
  display:flex;flex-direction:column;gap:0.4rem;align-items:center;
}
.pp-sidebar-credit{font-size:0.58rem;color:var(--pp-text-muted);text-align:center;letter-spacing:0.04em;}

/* ── 메인 영역 ── */
.pp-main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--pp-sidebar);overflow-y:auto;}

/* 커버 — 맥OS 창 스타일 */
.cover{
  position:relative;width:100%;height:340px;max-height:380px;min-height:200px;
  overflow:hidden;
  background:linear-gradient(160deg,var(--pp-green) 0%,#0e1a12 100%);
  display:flex;align-items:flex-end;justify-content:flex-start;
  flex-shrink:0;
}
.cover::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:32px;
  background:rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:5;
}
.cover::after{
  content:'⬤  ⬤  ⬤';
  position:absolute;top:8px;left:12px;
  font-size:0.55rem;letter-spacing:0.22rem;
  color:rgba(255,255,255,0.35);z-index:6;
  pointer-events:none;
}
.cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:1;}
.cover-img.loaded{display:block;}
.cover-img-overlay{
  position:absolute;inset:0;z-index:2;
  background:linear-gradient(to top, rgba(10,20,12,0.7) 0%, rgba(10,20,12,0.1) 60%, transparent 100%);
}
.deco-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:3;}
.deco{position:absolute;user-select:none;pointer-events:all;line-height:1;transition:box-shadow 0.12s;}
.deco.admin-deco{cursor:move;}
.deco img{display:block;border-radius:4px;}
.deco-resize{position:absolute;bottom:-5px;right:-5px;width:14px;height:14px;background:white;border:1.5px solid var(--pp-pink);border-radius:3px;cursor:se-resize;display:none;z-index:2;}
.deco.selected .deco-resize{display:block;}
.deco.selected{outline:2px solid var(--pp-pink);outline-offset:2px;}

.cover-textbox{
  position:relative;z-index:10;
  margin:0 1.5rem 1.5rem;
  max-width:360px;
}
.cover-title{
  font-size:clamp(1.3rem,4vw,2.2rem);font-weight:700;
  color:#fff;line-height:1.15;
  text-shadow:0 2px 12px rgba(0,0,0,0.4);
  letter-spacing:-0.01em;
}
.cover-sub{
  font-size:0.78rem;color:rgba(255,255,255,0.65);
  margin-top:0.3rem;letter-spacing:0.04em;
}

.cover-edit-bar{
  position:absolute;top:2.25rem;right:0.75rem;z-index:20;
  display:flex;gap:0.4rem;flex-wrap:wrap;justify-content:flex-end;
}
.icon-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:999px;padding:0.28rem 0.65rem;
  font-size:0.68rem;font-family:var(--font);
  color:rgba(255,255,255,0.9);cursor:pointer;
  white-space:nowrap;transition:background 0.15s;
  backdrop-filter:blur(6px);
}
.icon-pill:hover{background:rgba(255,255,255,0.25);}

.admin-only{display:none!important;}
.admin-only.show{display:inline-flex!important;}
.viewer-only{display:inline-flex!important;}
.viewer-only.hide{display:none!important;}

.sticker-palette{
  display:none;position:absolute;top:3.5rem;right:0.75rem;z-index:30;
  background:var(--pp-card);border:1px solid var(--pp-card-border);
  border-radius:14px;padding:0.75rem;gap:0.4rem;flex-wrap:wrap;
  max-width:220px;box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.sticker-palette.open{display:flex;}
.sticker-btn{font-size:1.3rem;cursor:pointer;border:none;background:none;border-radius:8px;padding:4px;transition:background 0.12s;line-height:1;}
.sticker-btn:hover{background:var(--pp-sidebar);}
.sticker-upload-btn{
  font-size:0.7rem;width:100%;background:var(--pp-sidebar);
  border:1.5px dashed var(--pp-card-border);border-radius:8px;
  padding:0.4rem;cursor:pointer;color:var(--pp-text-muted);
  font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:4px;
}
.sticker-upload-btn:hover{border-color:var(--pp-green);color:var(--pp-green);}

.cover-img-controls{
  display:none;position:absolute;bottom:0.5rem;left:0.5rem;z-index:20;
  background:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.95);
  border-radius:12px;padding:0.6rem 0.75rem;gap:0.5rem;
  flex-wrap:wrap;backdrop-filter:blur(6px);
}
.cover-img-controls.show{display:flex;}
.ctrl-group{display:flex;align-items:center;gap:0.4rem;}
.ctrl-lbl{font-size:0.65rem;color:var(--pp-text-muted);white-space:nowrap;}
.ctrl-range{width:80px;height:4px;accent-color:var(--pp-green);}
.ctrl-btn{background:none;border:1px solid var(--pp-card-border);border-radius:6px;padding:2px 7px;font-size:0.68rem;font-family:var(--font);cursor:pointer;color:var(--pp-text-sub);}
.ctrl-btn:hover{border-color:var(--pp-green);color:var(--pp-green);}

/* 홈 정보 스트립 */
.home-strip{
  background:var(--pp-card);
  border-bottom:1px solid var(--pp-card-border);
  padding:0.9rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:0.75rem;
}
.home-left{display:flex;align-items:center;gap:0.9rem;flex-wrap:wrap;}
.home-counts{display:flex;gap:1rem;flex-wrap:wrap;}
.hcount{text-align:center;padding:0 0.4rem;}
.hcount-num{font-size:1.2rem;font-weight:700;color:var(--pp-green);}
.hcount-lbl{font-size:0.65rem;color:var(--pp-text-muted);margin-top:1px;letter-spacing:0.04em;}

.admin-badge{
  display:none;align-items:center;gap:5px;
  background:rgba(36,85,61,0.1);border:1px solid rgba(36,85,61,0.3);
  border-radius:999px;padding:0.2rem 0.65rem;
  font-size:0.7rem;font-weight:600;color:var(--pp-green);
}
.admin-badge.show{display:inline-flex;}
.admin-logout{background:none;border:none;cursor:pointer;font-size:0.7rem;color:var(--pp-text-muted);font-family:var(--font);text-decoration:underline;padding:0;}

.go-archive-btn{
  background:var(--pp-green);border:none;border-radius:8px;
  padding:0.5rem 1.2rem;font-family:var(--font);font-size:0.8rem;
  font-weight:600;color:#fff;cursor:pointer;transition:opacity 0.15s;
  letter-spacing:0.02em;
}
.go-archive-btn:hover{opacity:0.85;}

/* 홈 콘텐츠 영역 */
.pp-home-content{
  background:var(--pp-sidebar);
  flex:1;padding:1.25rem 1.5rem 3rem;
  display:flex;flex-direction:column;gap:1.25rem;
}

/* 핀/최근 섹션 */
.home-pinned{padding:0;}
.home-recent{padding:0;}

.section-label{
  font-size:0.68rem;font-weight:700;letter-spacing:0.1em;
  color:var(--pp-text-muted);text-transform:uppercase;
  margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--pp-card-border);}

.pin-manage-btn{
  font-size:0.65rem;background:none;
  border:1px solid var(--pp-card-border);border-radius:999px;
  padding:1px 7px;cursor:pointer;font-family:var(--font);
  color:var(--pp-text-muted);
}
.pin-manage-btn:hover{border-color:var(--pp-green);color:var(--pp-green);}

.recent-row{
  display:flex;gap:0.7rem;overflow-x:auto;
  padding-bottom:0.4rem;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.recent-row::-webkit-scrollbar{display:none;}

.mini-card{
  flex:0 0 148px;background:var(--pp-card);
  border:1px solid var(--pp-card-border);border-radius:12px;
  padding:0.8rem 0.85rem;cursor:pointer;
  transition:border-color 0.15s,transform 0.15s;position:relative;
}
.mini-card:hover{border-color:var(--pp-green);transform:translateY(-2px);}
.mini-type{font-size:0.65rem;color:var(--pp-text-muted);margin-bottom:0.25rem;letter-spacing:0.04em;}
.mini-title{font-size:0.8rem;font-weight:600;color:var(--pp-text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mini-date{font-size:0.63rem;color:var(--pp-text-muted);margin-top:0.35rem;}
.pin-mark{position:absolute;top:0.4rem;right:0.4rem;font-size:0.65rem;}

/* ── 아카이브 페이지 ── */
.arc-header{
  background:var(--pp-card);
  border-bottom:1px solid var(--pp-card-border);
  padding:1rem 1.5rem 0;
  flex-shrink:0;
  z-index:50;
}
.arc-top{
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;margin-bottom:0.85rem;flex-wrap:wrap;
}
.arc-title-row{display:flex;align-items:center;gap:0.6rem;}

.back-btn{
  background:none;border:1px solid var(--pp-card-border);
  border-radius:8px;padding:0.28rem 0.75rem;
  font-family:var(--font);font-size:0.75rem;
  color:var(--pp-text-sub);cursor:pointer;transition:all 0.15s;
}
.back-btn:hover{border-color:var(--pp-green);color:var(--pp-green);}

.arc-heading{font-size:0.95rem;font-weight:700;color:var(--pp-text);}

.arc-controls{display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;}
.search-wrap{position:relative;}
.search-wrap input{
  background:var(--pp-sidebar);
  border:1px solid var(--pp-card-border);
  border-radius:8px;padding:0.38rem 0.75rem 0.38rem 1.9rem;
  font-family:var(--font);font-size:0.78rem;
  color:var(--pp-text);outline:none;width:170px;transition:border-color 0.15s;
}
.search-wrap input:focus{border-color:var(--pp-green);}
.search-ico{position:absolute;left:0.6rem;top:50%;transform:translateY(-50%);font-size:0.72rem;color:var(--pp-text-muted);pointer-events:none;}

.add-btn{
  background:var(--pp-green);border:none;border-radius:8px;
  padding:0.38rem 0.9rem;font-family:var(--font);
  font-size:0.78rem;font-weight:600;color:#fff;
  cursor:pointer;transition:opacity 0.15s;
}
.add-btn:hover{opacity:0.85;}

.tab-bar{
  display:flex;gap:0;overflow-x:auto;
  scrollbar-width:none;align-items:center;
}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{
  background:none;border:none;padding:0.55rem 1rem;
  font-family:var(--font);font-size:0.78rem;
  color:var(--pp-text-muted);cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;
  transition:color 0.15s;
}
.tab:hover{color:var(--pp-text);}
.tab.active{color:var(--pp-green);border-bottom-color:var(--pp-green);font-weight:600;}
.tab-add-btn{
  background:none;border:none;font-size:0.85rem;
  padding:0.4rem 0.5rem;cursor:pointer;
  color:var(--pp-text-muted);display:none;
}

.is-admin .tab-add-btn{display:block;}

/* [수정 부분] .arc-grid 속성에 유연한 최대 높이와 스크롤 지정 */
.arc-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  align-content:start;
  gap:0.85rem;padding:1.1rem 1.5rem 2rem;
  background:var(--pp-sidebar);
  flex:1;
  overflow-y:auto;       /* 넘치는 카드는 아래 스크롤로 확인 가능 */
  min-height: 0;          /* Flexbox 자식으로서 크기가 깨지는 것 방지 */
  flex-shrink: 0;         /* 공간 부족 시 영역이 찌그러지는 것 방지 */
}

/* 아카이브 카드 */
.card{
  background:var(--pp-card);
  border:1px solid var(--pp-card-border);
  border-radius:12px;padding:1rem 1.1rem;
  cursor:pointer;transition:border-color 0.18s,transform 0.18s,box-shadow 0.18s;
  display:flex;flex-direction:column;gap:0.6rem;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--pp-green),var(--pp-pink));
  opacity:0;transition:opacity 0.18s;
}
.card:hover{
  border-color:var(--pp-green-light);
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(36,85,61,0.1);
}
.card:hover::before{opacity:1;}

.card-type-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:0.65rem;font-weight:600;
  background:rgba(36,85,61,0.07);
  border:1px solid rgba(36,85,61,0.15);
  border-radius:5px;padding:2px 7px;
  color:var(--pp-green);align-self:flex-start;
  letter-spacing:0.04em;
}
.card-title{font-size:0.88rem;font-weight:700;line-height:1.4;color:var(--pp-text);}
.card-thumb{width:100%;aspect-ratio:16/9;border-radius:8px;object-fit:cover;background:var(--pp-sidebar);}
.card-body{font-size:0.78rem;color:var(--pp-text-sub);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.65;}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;margin-top:auto;}
.tags{display:flex;gap:0.25rem;flex-wrap:wrap;}
.tag{
  font-size:0.63rem;background:rgba(231,160,168,0.1);
  border-radius:4px;padding:2px 6px;
  color:var(--pp-accent);border:1px solid rgba(199,95,107,0.2);
}
.card-date{font-size:0.63rem;color:var(--pp-text-muted);}
.card-actions{position:absolute;top:0.5rem;right:0.5rem;display:none;gap:4px;}
.is-admin .card:hover .card-actions{display:flex;}
.card-act-btn{
  background:rgba(255,255,255,0.95);
  border:1px solid var(--pp-card-border);
  border-radius:5px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.68rem;color:var(--pp-text-muted);
}
.card-act-btn:hover{color:var(--pp-green);}
.card.pinned .card-type-badge::after{content:' 📌';font-size:0.6rem;}
.empty-state{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--pp-text-muted);font-size:0.85rem;}
.empty-state .big{font-size:2.5rem;margin-bottom:0.75rem;}
.overlay{display:none;position:fixed;inset:0;background:rgba(100,60,100,0.18);z-index:200;align-items:flex-start;justify-content:flex-end;padding:1rem;}
.overlay.open{display:flex;}
.overlay.center{align-items:center;justify-content:center;padding:1rem;}
.panel{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:1.5rem;width:300px;margin-top:4rem;display:flex;flex-direction:column;gap:1.25rem;max-height:calc(100vh - 6rem);overflow-y:auto;}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:1.75rem;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;}
.modal-head{display:flex;align-items:center;justify-content:space-between;}
.modal-ttl{font-size:1rem;font-weight:700;}
.x-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--text-muted);line-height:1;}
.sp-title{font-size:0.95rem;font-weight:700;}
.sp-section{font-size:0.72rem;color:var(--text-muted);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.palette-row{display:flex;gap:0.5rem;flex-wrap:wrap;}
.palette-swatch{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform 0.15s;}
.palette-swatch:hover{transform:scale(1.1);}
.custom-colors{display:flex;flex-direction:column;gap:0.6rem;}
.color-row{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
.color-lbl{font-size:0.8rem;color:var(--text-sub);}
.color-inp{width:40px;height:28px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;padding:2px;}
.sp-input{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:0.5rem 0.75rem;font-family:var(--font);font-size:0.82rem;color:var(--text);outline:none;width:100%;}
.sp-input:focus{border-color:var(--accent);}
.sp-btn{background:linear-gradient(135deg,var(--p1),var(--p2));border:none;border-radius:999px;padding:0.55rem 1rem;font-family:var(--font);font-size:0.82rem;font-weight:600;color:var(--text);cursor:pointer;text-align:center;}
.field-lbl{font-size:0.75rem;color:var(--text-sub);margin-bottom:0.25rem;font-weight:600;}
.field-inp,.field-ta{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:0.55rem 0.8rem;font-family:var(--font);font-size:0.85rem;color:var(--text);outline:none;transition:border-color 0.15s;}
.field-inp:focus,.field-ta:focus{border-color:var(--accent);}
.field-ta{resize:vertical;min-height:110px;}
.type-chips{display:flex;gap:0.4rem;flex-wrap:wrap;}
.type-chip{background:var(--bg);border:1.5px solid var(--border);border-radius:999px;padding:0.3rem 0.8rem;font-family:var(--font);font-size:0.78rem;color:var(--text-sub);cursor:pointer;transition:all 0.15s;}
.type-chip.on{background:linear-gradient(135deg,var(--p1),var(--p2));border-color:var(--p2);color:var(--text);font-weight:600;}
.modal-actions{display:flex;gap:0.75rem;justify-content:flex-end;}
.btn-ghost{background:none;border:1.5px solid var(--border);border-radius:999px;padding:0.5rem 1rem;font-family:var(--font);font-size:0.82rem;color:var(--text-sub);cursor:pointer;transition:border-color 0.15s;}

.btn-save{background:linear-gradient(135deg,var(--p1),var(--p2));border:none;border-radius:999px;padding:0.5rem 1.25rem;font-family:var(--font);font-size:0.82rem;font-weight:700;color:var(--text);cursor:pointer;transition:opacity 0.15s;}
.btn-save:hover{opacity:0.85;}
.btn-danger{background:none;border:1.5px solid #e07a7a;border-radius:999px;padding:0.5rem 1rem;font-family:var(--font);font-size:0.82rem;color:#e07a7a;cursor:pointer;}
.detail-img{width:100%;border-radius:12px;margin-top:0.25rem;}
.detail-body{font-size:0.88rem;color:var(--text-sub);white-space:pre-wrap;line-height:1.8;}
.detail-tags{display:flex;gap:0.35rem;flex-wrap:wrap;}
.detail-date{font-size:0.75rem;color:var(--text-muted);}
.detail-html-render{font-size:0.88rem;line-height:1.8;}
.detail-html-render img,.detail-html-render video,.detail-html-render iframe{max-width:100%;border-radius:8px;}
.detail-html-render table{max-width:100%;border-collapse:collapse;}
.html-badge{display:inline-flex;align-items:center;gap:3px;font-size:0.65rem;font-weight:700;background:linear-gradient(135deg,var(--p2),var(--accent));color:#fff;border-radius:999px;padding:2px 7px;margin-left:4px;}
.card-html-render{font-size:0.78rem;color:var(--pp-text-sub);line-height:1.55;max-height:5.2em;overflow:hidden;position:relative;}
.card-html-render::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1.6em;background:linear-gradient(to bottom,transparent,var(--pp-card));}

/* ── 상세보기: 이미지가 있으면 2단(텍스트+이미지) 레이아웃 ── */
.modal.detail-modal{max-width:780px;padding:0;overflow:hidden;flex-direction:row;max-height:85vh;}
.modal.detail-modal:not(.has-img){max-width:500px;flex-direction:column;padding:1.75rem;}
.detail-modal-text{flex:1;min-width:0;padding:1.75rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;}
.modal.detail-modal:not(.has-img) .detail-modal-text{padding:0;overflow:visible;}
.detail-modal-imgwrap{width:300px;flex-shrink:0;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;}
.modal.detail-modal:not(.has-img) .detail-modal-imgwrap{display:none;}
.detail-modal-imgwrap img{width:100%;height:auto;display:block;}

@media(max-width:640px){
  .modal.detail-modal{flex-direction:column;max-width:500px;max-height:90vh;}
  .detail-modal-imgwrap{width:100%;border-left:none;border-top:1px solid var(--border);max-height:240px;}
  .detail-modal-text{padding:1.25rem;}
}
</style>

<body>

<div class="app-window" id="appWindow">
  <div class="app-titlebar">
    <div class="app-titlebar-dot red"></div>
    <div class="app-titlebar-dot yellow"></div>
    <div class="app-titlebar-dot green"></div>
    <div class="app-titlebar-label">LOVE</div>
  </div>

  <div class="page active" id="pairPage">
    <div id="home">
      <div class="pp-main">
        <div class="cover">
          <div class="cover-textbox">
            <h1 class="cover-title">기록 보관소</h1>
            <p class="cover-sub">추억과 일상을 기록하는 공간</p>
          </div>
        </div>
        
        <div class="arc-grid" id="recordListContainer">
          </div>
      </div>
    </div>
  </div>

  <div class="win-resize-handle"></div>
</div>

<script>
// 기존 크기 조절 및 모모 터치 스크립트 로직 실행부
(function() {
  const win = document.getElementById('appWindow');
  const handle = document.querySelector('.win-resize-handle');
  if (!win || !handle) return;

  let dragging = false;
  let startX, startY, startW, startH;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    const rect = win.getBoundingClientRect();
    startW = rect.width; startH = rect.height;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dw = e.clientX - startX, dh = e.clientY - startY;
    win.style.width = Math.max(420, startW + dw) + 'px';
    win.style.height = Math.max(400, startH + dh) + 'px';
  });

  document.addEventListener('mouseup', () => { dragging = false; });
})();
</script>
